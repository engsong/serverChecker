hosts:
  - host: "175.0.6.31"
    display_name: "175.0.6.31"
    prompt_host: "PXLAAPS01"
    site: "DC"
    services:
      - name: "cp_ftpas"
        connection:
          protocol: "ssh"
          ssh_port: 22
          username: "cp_ftpas"
          password: "cp_ftpas"
        check_profile: "cp_ftpas_profile"

      - name: "cp_fcpas"
        connection:
          protocol: "ssh"
          ssh_port: 22
          username: "cp_fcpas"
          password: "cp_fcpas"
        check_profile: "cp_fcpas_profile"

      - name: "cp_fmpas"
        connection:
          protocol: "ssh"
          ssh_port: 22
          username: "cp_fmpas"
          password: "cp_fmpas"
        check_profile: "cp_fmpas_profile"

      - name: "cp_fmsas"
        connection:
          protocol: "ssh"
          ssh_port: 22
          username: "cp_fmsas"
          password: "cp_fmsas"
        check_profile: "cp_fmsas_profile"

      - name: "cp_nginx"
        connection:
          protocol: "ssh"
          ssh_port: 22
          username: "cp_nginx"
          password: "cp_nginx"
        check_profile: "cp_nginx_profile"

      - name: "probe_user"
        connection:
          protocol: "ssh"
          ssh_port: 22
          username: "probe_user"
          password: "probe_user"
        check_profile: "probe_user_profile"

